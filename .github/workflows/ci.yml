# SWAT API — CI 工作流
# 持续集成：测试 + 代码检查 + Docker 构建验证

name: CI

on:
  push:
    branches: [main, feature/**, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      # ── 检出代码 ──────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 设置 Python 3.11 ──────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 缓存 pip 依赖 ─────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 安装依赖 ──────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install fastapi uvicorn aiohttp aiocache pydantic-settings

      # ── 代码格式检查 (black) ──────────────
      - name: Check code formatting with black
        run: |
          pip install black
          black --check api/ short_win_ai_trader/ tests/ || true

      # ── 导入排序检查 (isort) ──────────────
      - name: Check import sorting with isort
        run: |
          pip install isort
          isort --check-only api/ short_win_ai_trader/ tests/ || true

      # ── 静态类型检查 (mypy) ───────────────
      - name: Type check with mypy
        run: |
          pip install mypy types-pyyaml
          mypy api/ --ignore-missing-imports || true

      # ── 运行 pytest ───────────────────────
      - name: Run pytest
        run: |
          pytest tests/ -v --cov=api --cov=short_win_ai_trader --cov-report=xml --cov-report=term

      # ── 上传覆盖率报告 ────────────────────
      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      # ── 检出代码 ──────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 设置 Docker Buildx ────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 缓存 Docker 层 ────────────────────
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # ── 构建 Docker 镜像 ──────────────────
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: swat-api:test
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # ── 验证镜像 ──────────────────────────
      - name: Verify Docker image
        run: |
          docker images swat-api:test
          docker run --rm -d --name swat-api-test -p 8000:8000 swat-api:test
          sleep 5
          curl -f http://localhost:8000/health || (docker logs swat-api-test && exit 1)
          docker stop swat-api-test

      # ── 更新缓存 ──────────────────────────
      - name: Update cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
