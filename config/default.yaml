# 短线致胜 AI 交易智能体 — 默认配置

# 数据配置
data:
  ifind:
    enabled: true
    rate_limit: 10
    cache_dir: "./cache"
    cache_ttl: 300
    max_tickers_per_query: 10
    max_date_range_years: 3

# 情绪周期配置
emotion_cycle:
  default_weights:
    market_index: 0.25
    board_index: 0.25
    fund_index: 0.25
    theme_index: 0.25
  thresholds:
    high_explode_rate: 50.0
    high_limit_down: 10
    volume_anomaly: 30.0

# 仓位配置 (单位: %)
position:
  chaos_max: 20
  start_max: 40
  ferment_max: 60
  peak_max: 30
  diverge_max: 30
  retreat_max: 10
  single_stock_max:
    chaos: 10
    start: 40
    ferment: 35
    peak: 20
    diverge: 15
    retreat: 5

# 评分配置
scoring:
  dimensions:
    news_catalyst:
      weight: 20
      sub_weights:
        level: 0.4
        timeliness: 0.3
        strength: 0.2
        market_feedback: 0.1
    fundamental:
      weight: 15
      sub_weights:
        growth: 0.35
        valuation: 0.25
        health: 0.25
        theme_purity: 0.15
    technical:
      weight: 20
      sub_weights:
        ma_system: 0.3
        breakout: 0.3
        volume: 0.2
        indicators: 0.2
    chip_structure:
      weight: 15
      sub_weights:
        concentration: 0.3
        lock_ratio: 0.3
        trapped_ratio: 0.2
        peak_shape: 0.2
    emotion_fit:
      weight: 15
      sub_weights:
        cycle_match: 0.4
        sector_effect: 0.25
        dragon_status: 0.2
        profit_effect: 0.15
    fund_flow:
      weight: 15
      sub_weights:
        main_inflow: 0.35
        dragon_bond: 0.25
        seal_strength: 0.25
        northbound: 0.15

# 风控配置
risk:
  default_stop_loss: 4
  max_stop_loss: 5
  min_take_profit: 8
  max_take_profit: 20
  golden_take_profit: 15
  min_risk_reward: 1.5
  score_update_interval: 900
  score_trigger_threshold: 10

# 锚定标的配置
anchors:
  max_count: 5
  min_count: 3
  update_interval: 10
  weights:
    height: 0.30
    recognition: 0.25
    drive: 0.25
    premium: 0.20

# 板块效应预警配置
alert:
  sector_effect_threshold: 3
  sector_avg_open_high: 3.0
  sector_daily_change: 5.0
  fund_outflow_threshold: 1000000000  # 10亿
  expectation_check_interval: 30
  fund_summary_interval: 1800

# 游资配置
gingyou:
  fingerprints_file: "config/yingyou_fingerprints.json"
  match_score_threshold: 60
  update_interval: 900
  consensus_min_count: 3

# 战法配置
tactics:
  rules_file: "config/tactic_rules.json"
  max_results_per_tactic: 5
  resonance_levels:
    - "双战法共振"
    - "三战法共振"
    - "多战法强共振"

# 交割单配置
trade:
  supported_formats: ["xlsx", "csv"]
  diagnosis_interval: 86400

# 日志配置
logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: "logs/swat.log"
  max_size: 10485760
  backup_count: 5
