<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 短线致胜 AI 交易智能体</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 420px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .logo p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: #6366f1;
            background: rgba(99,102,241,0.1);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .form-options label {
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            cursor: pointer;
        }
        .form-options label input[type="checkbox"] {
            margin-right: 6px;
            accent-color: #6366f1;
        }
        .form-options a {
            color: #6366f1;
            font-size: 13px;
            text-decoration: none;
        }
        .form-options a:hover {
            text-decoration: underline;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99,102,241,0.4);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider span {
            padding: 0 16px;
        }
        .register-link {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
        .register-link a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .error-msg {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .success-msg {
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.3);
            color: #86efac;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .success-msg.show {
            display: block;
        }
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🎯 短线致胜</h1>
            <p>AI 交易智能体 · 登录</p>
        </div>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>用户名 / 邮箱 / 手机号</label>
                <input type="text" id="username" placeholder="请输入用户名、邮箱或手机号" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>
            <div class="form-options">
                <label>
                    <input type="checkbox" id="rememberMe"> 记住我
                </label>
                <a href="#">忘记密码？</a>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">登 录</button>
        </form>

        <div class="divider"><span>或</span></div>

        <div class="register-link">
            还没有账号？<a href="register.html">立即注册</a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1';

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
            document.getElementById('successMsg').classList.remove('show');
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.classList.add('show');
            document.getElementById('errorMsg').classList.remove('show');
        }

        function hideMessages() {
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('successMsg').classList.remove('show');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>登录中...';

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                const data = await response.json();

                if (data.code === 200) {
                    // 保存Token
                    localStorage.setItem('access_token', data.data.access_token);
                    localStorage.setItem('refresh_token', data.data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));

                    showSuccess('登录成功！正在跳转...');

                    // 跳转到首页
                    setTimeout(() => {
                        window.location.href = 'market-dashboard.html';
                    }, 1000);
                } else {
                    showError(data.message || '登录失败，请检查用户名和密码');
                }
            } catch (err) {
                showError('网络错误，请稍后重试');
                console.error('Login error:', err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '登 录';
            }
        });

        // 检查是否已登录
        const token = localStorage.getItem('access_token');
        if (token) {
            // 验证Token是否有效
            fetch(`${API_BASE}/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(res => res.json()).then(data => {
                if (data.code === 200) {
                    window.location.href = 'market-dashboard.html';
                }
            }).catch(() => {});
        }
    </script>
</body>
</html>
