<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 短线致胜 AI 交易智能体</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2235;
            --bg-card-hover: #1f2a40;
            --border-color: #2a3550;
            --text-primary: #e8eaed;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --accent-purple: #8b5cf6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 20px 0;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            overflow-y: auto;
        }
        .sidebar-logo {
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 16px;
        }
        .sidebar-logo h2 {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-logo p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .sidebar-menu {
            list-style: none;
        }
        .sidebar-menu li {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .sidebar-menu li:hover, .sidebar-menu li.active {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        .sidebar-menu li.active {
            border-left: 3px solid var(--accent-blue);
        }
        .main-content {
            margin-left: 240px;
            flex: 1;
            padding: 24px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .page-title {
            font-size: 22px;
            font-weight: 700;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }
        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .stat-card .stat-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'SF Mono', monospace;
        }
        .stat-card .stat-change {
            font-size: 12px;
            margin-top: 4px;
        }
        .stat-card .stat-change.up { color: var(--accent-green); }
        .stat-card .stat-change.down { color: var(--accent-red); }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        td {
            padding: 12px 14px;
            font-size: 13px;
            border-bottom: 1px solid rgba(42, 53, 80, 0.5);
        }
        tr:hover td { background: var(--bg-card-hover); }
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .tag-active { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .tag-inactive { background: rgba(107, 114, 128, 0.15); color: var(--text-muted); }
        .tag-banned { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }
        .tag-season { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .tag-annual { background: rgba(139, 92, 246, 0.15); color: var(--accent-purple); }
        .tag-trial { background: rgba(245, 158, 11, 0.15); color: var(--accent-orange); }
        .tag-free { background: rgba(107, 114, 128, 0.15); color: var(--text-muted); }
        .tag-paid { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .tag-pending { background: rgba(245, 158, 11, 0.15); color: var(--accent-orange); }
        .tag-cancelled { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }
        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-sm { padding: 4px 10px; font-size: 11px; }
        .btn-primary { background: var(--accent-blue); color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-danger { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.3); }
        .btn-success { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
        .btn-success:hover { background: rgba(16, 185, 129, 0.3); }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        .btn-outline:hover { border-color: var(--accent-blue); color: var(--text-primary); }
        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .search-bar input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
        }
        .search-bar input:focus { border-color: var(--accent-blue); }
        .search-bar select {
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }
        .pagination button {
            padding: 8px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
        }
        .pagination button:hover, .pagination button.active {
            background: var(--accent-blue);
            color: #fff;
            border-color: var(--accent-blue);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .toast {
            position: fixed; top: 20px; right: 20px;
            padding: 12px 20px; border-radius: 8px;
            font-size: 13px; z-index: 300;
            animation: slideIn 0.3s ease;
        }
        .toast-success { background: var(--accent-green); color: white; }
        .toast-error { background: var(--accent-red); color: white; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <h2>🎯 管理后台</h2>
            <p>短线致胜 AI 交易智能体</p>
        </div>
        <ul class="sidebar-menu">
            <li class="active" onclick="switchTab('dashboard')">📊 仪表盘</li>
            <li onclick="switchTab('users')">👥 用户管理</li>
            <li onclick="switchTab('orders')">📦 订单管理</li>
            <li onclick="switchTab('security')">🔒 安全管理</li>
            <li onclick="switchTab('audit')">📋 审计日志</li>
            <li onclick="window.location.href='market-dashboard.html'" style="margin-top: 20px; color: var(--accent-cyan);">↩ 返回前台</li>
            <li onclick="logout()">🚪 退出登录</li>
        </ul>
    </div>

    <div class="main-content">
        <!-- 仪表盘 -->
        <div id="tab-dashboard" class="tab-content active">
            <div class="page-header">
                <h1 class="page-title">📊 管理仪表盘</h1>
                <button class="btn btn-outline" onclick="loadDashboard()">⟳ 刷新</button>
            </div>
            <div class="stats-grid" id="dashboardStats">
                <div class="stat-card">
                    <div class="stat-label">总用户数</div>
                    <div class="stat-value" style="color: var(--accent-cyan);" id="totalUsers">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">活跃用户</div>
                    <div class="stat-value" style="color: var(--accent-green);" id="activeUsers">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">会员用户</div>
                    <div class="stat-value" style="color: var(--accent-purple);" id="memberUsers">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">总收入</div>
                    <div class="stat-value" style="color: var(--accent-orange);" id="totalRevenue">--</div>
                </div>
            </div>
        </div>

        <!-- 用户管理 -->
        <div id="tab-users" class="tab-content">
            <div class="page-header">
                <h1 class="page-title">👥 用户管理</h1>
            </div>
            <div class="card">
                <div class="search-bar">
                    <input type="text" id="userSearch" placeholder="搜索用户名/邮箱...">
                    <select id="userStatusFilter">
                        <option value="">全部状态</option>
                        <option value="active">活跃</option>
                        <option value="inactive">未激活</option>
                        <option value="banned">封禁</option>
                    </select>
                    <button class="btn btn-primary" onclick="loadUsers()">搜索</button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>邮箱</th>
                                <th>会员类型</th>
                                <th>状态</th>
                                <th>注册时间</th>
                                <th>最后登录</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr><td colspan="8" style="text-align:center; padding:40px; color:var(--text-muted)">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination" id="usersPagination"></div>
            </div>
        </div>

        <!-- 订单管理 -->
        <div id="tab-orders" class="tab-content">
            <div class="page-header">
                <h1 class="page-title">📦 订单管理</h1>
            </div>
            <div class="card">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>订单号</th>
                                <th>用户</th>
                                <th>会员类型</th>
                                <th>金额</th>
                                <th>状态</th>
                                <th>创建时间</th>
                                <th>支付时间</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody">
                            <tr><td colspan="7" style="text-align:center; padding:40px; color:var(--text-muted)">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 安全管理 -->
        <div id="tab-security" class="tab-content">
            <div class="page-header">
                <h1 class="page-title">🔒 安全管理</h1>
            </div>
            <div class="card">
                <div class="card-header">
                    <span class="card-title">封禁IP列表</span>
                    <button class="btn btn-primary" onclick="loadBlockedIPs()">刷新</button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>IP地址</th>
                                <th>封禁原因</th>
                                <th>封禁时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="blockedIPsBody">
                            <tr><td colspan="4" style="text-align:center; padding:40px; color:var(--text-muted)">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 审计日志 -->
        <div id="tab-audit" class="tab-content">
            <div class="page-header">
                <h1 class="page-title">📋 审计日志</h1>
            </div>
            <div class="card">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>用户</th>
                                <th>操作</th>
                                <th>详情</th>
                            </tr>
                        </thead>
                        <tbody id="auditLogBody">
                            <tr><td colspan="4" style="text-align:center; padding:40px; color:var(--text-muted)">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1';

        function getToken() {
            return localStorage.getItem('access_token');
        }

        function showToast(msg, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.sidebar-menu li').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.target.classList.add('active');

            // 加载对应数据
            if (tabName === 'dashboard') loadDashboard();
            if (tabName === 'users') loadUsers();
            if (tabName === 'orders') loadOrders();
            if (tabName === 'security') loadBlockedIPs();
            if (tabName === 'audit') loadAuditLogs();
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        async function apiRequest(url, options = {}) {
            const token = getToken();
            if (!token) {
                window.location.href = 'login.html';
                return null;
            }
            const resp = await fetch(`${API_BASE}${url}`, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });
            return resp.json();
        }

        async function loadDashboard() {
            const data = await apiRequest('/admin/dashboard');
            if (data && data.code === 200) {
                const d = data.data;
                document.getElementById('totalUsers').textContent = d.users?.total || 0;
                document.getElementById('activeUsers').textContent = d.users?.active || 0;
                document.getElementById('memberUsers').textContent = d.membership?.total_members || 0;
                document.getElementById('totalRevenue').textContent = `¥${d.revenue?.total || 0}`;
            }
        }

        async function loadUsers(page = 1) {
            const keyword = document.getElementById('userSearch')?.value || '';
            const status = document.getElementById('userStatusFilter')?.value || '';
            let url = `/admin/users?page=${page}&page_size=20`;
            if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
            if (status) url += `&status=${status}`;

            const data = await apiRequest(url);
            if (data && data.code === 200) {
                const users = data.data.users || [];
                const tbody = document.getElementById('usersTableBody');
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px; color:var(--text-muted)">暂无数据</td></tr>';
                    return;
                }
                const typeMap = { free: '免费', trial: '体验', season: '季卡', annual: '年卡' };
                const statusMap = { active: '活跃', inactive: '未激活', banned: '封禁' };
                tbody.innerHTML = users.map(u => `
                    <tr>
                        <td style="font-family:monospace; color:var(--text-muted)">${u.id.substring(0,8)}</td>
                        <td style="font-weight:600">${u.username}</td>
                        <td style="color:var(--text-muted)">${u.email || '--'}</td>
                        <td><span class="tag tag-${u.membership_type}">${typeMap[u.membership_type] || '--'}</span></td>
                        <td><span class="tag tag-${u.status}">${statusMap[u.status] || u.status}</span></td>
                        <td style="color:var(--text-muted); font-size:12px">${u.created_at ? new Date(u.created_at).toLocaleDateString() : '--'}</td>
                        <td style="color:var(--text-muted); font-size:12px">${u.last_login_at ? new Date(u.last_login_at).toLocaleDateString() : '--'}</td>
                        <td>
                            ${u.status === 'banned'
                                ? `<button class="btn btn-sm btn-success" onclick="updateUserStatus('${u.id}','active')">解封</button>`
                                : `<button class="btn btn-sm btn-danger" onclick="updateUserStatus('${u.id}','banned')">封禁</button>`
                            }
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function updateUserStatus(userId, status) {
            const data = await apiRequest(`/admin/users/${userId}/status?status=${status}`, { method: 'PUT' });
            if (data && data.code === 200) {
                showToast('操作成功', 'success');
                loadUsers();
            } else {
                showToast(data?.message || '操作失败', 'error');
            }
        }

        async function loadOrders() {
            const data = await apiRequest('/admin/orders?page=1&page_size=50');
            if (data && data.code === 200) {
                const orders = data.data.orders || [];
                const tbody = document.getElementById('ordersTableBody');
                if (orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--text-muted)">暂无订单</td></tr>';
                    return;
                }
                const typeMap = { season: '季卡', annual: '年卡' };
                const statusMap = { pending: '待支付', paid: '已支付', cancelled: '已取消', refunded: '已退款' };
                tbody.innerHTML = orders.map(o => `
                    <tr>
                        <td style="font-family:monospace; font-size:12px">${o.order_no}</td>
                        <td style="font-size:12px">${o.user_id.substring(0,8)}</td>
                        <td>${typeMap[o.membership_type] || o.membership_type}</td>
                        <td style="font-weight:700; color:var(--accent-orange)">¥${o.amount}</td>
                        <td><span class="tag tag-${o.status}">${statusMap[o.status] || o.status}</span></td>
                        <td style="font-size:12px; color:var(--text-muted)">${o.created_at ? new Date(o.created_at).toLocaleString() : '--'}</td>
                        <td style="font-size:12px; color:var(--text-muted)">${o.paid_at ? new Date(o.paid_at).toLocaleString() : '--'}</td>
                    </tr>
                `).join('');
            }
        }

        async function loadBlockedIPs() {
            const data = await apiRequest('/admin/security/blocked-ips');
            if (data && data.code === 200) {
                const ips = data.data.blocked_ips || [];
                const tbody = document.getElementById('blockedIPsBody');
                if (ips.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px; color:var(--text-muted)">暂无封禁IP</td></tr>';
                    return;
                }
                tbody.innerHTML = ips.map(ip => `
                    <tr>
                        <td style="font-family:monospace">${ip.ip}</td>
                        <td style="color:var(--text-muted)">${ip.reason || '--'}</td>
                        <td style="font-size:12px; color:var(--text-muted)">${ip.blocked_at ? new Date(ip.blocked_at).toLocaleString() : '--'}</td>
                        <td><button class="btn btn-sm btn-success" onclick="unblockIP('${ip.ip}')">解封</button></td>
                    </tr>
                `).join('');
            }
        }

        async function unblockIP(ip) {
            const data = await apiRequest(`/admin/security/unblock-ip?ip=${encodeURIComponent(ip)}`, { method: 'POST' });
            if (data && data.code === 200) {
                showToast('IP已解封', 'success');
                loadBlockedIPs();
            } else {
                showToast(data?.message || '操作失败', 'error');
            }
        }

        async function loadAuditLogs() {
            const data = await apiRequest('/admin/audit/logs?page=1&page_size=50');
            if (data && data.code === 200) {
                const logs = data.data.logs || [];
                const tbody = document.getElementById('auditLogBody');
                if (logs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px; color:var(--text-muted)">暂无日志</td></tr>';
                    return;
                }
                tbody.innerHTML = logs.map(l => `
                    <tr>
                        <td style="font-size:12px; color:var(--text-muted)">${l.timestamp ? new Date(l.timestamp).toLocaleString() : '--'}</td>
                        <td style="font-size:12px">${l.user_id ? l.user_id.substring(0,8) : '系统'}</td>
                        <td>${l.action || '--'}</td>
                        <td style="color:var(--text-muted); font-size:12px">${l.details ? JSON.stringify(l.details) : '--'}</td>
                    </tr>
                `).join('');
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 检查管理员权限
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!user.is_admin) {
                showToast('需要管理员权限', 'error');
                setTimeout(() => window.location.href = 'market-dashboard.html', 1500);
                return;
            }
            loadDashboard();
        });
    </script>
</body>
